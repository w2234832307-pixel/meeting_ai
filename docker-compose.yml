  # 主服务
  meeting-ai:
    build:
      context: .
      dockerfile: Dockerfile
    image: meeting-ai:latest
    container_name: meeting-ai
    ports:
      - "8000:8000"
    env_file:
      - .env  # 从 .env 文件加载环境变量（推荐方式）
    environment:
      - FUNASR_SERVICE_URL=http://funasr-gpu0:8002/api/v1  # 默认URL，实际会动态选择
      - PYANNOTE_SERVICE_URL=http://pyannote-gpu0:8100  # 默认URL，实际会动态选择
      - MAX_FUNASR_GPU_INSTANCES=7  # FunASR/Pyannote GPU 实例数量（funasr-gpu0 到 funasr-gpu6）
      # 注意：LLM_API_KEY、LLM_BASE_URL、LLM_MODEL_NAME 等敏感配置建议通过 .env 文件传递
      # 如果 .env 文件不存在，可以在这里直接添加（不推荐，因为会暴露密钥）：
      # - LLM_API_KEY=your-api-key-here
      # - LLM_BASE_URL=https://api.deepseek.com
      # - LLM_MODEL_NAME=deepseek-chat
    volumes:
      # 挂载日志和临时文件目录（可选，方便查看日志）
      - ./logs:/app/logs
      - ./temp_files:/app/temp_files
      - ./models:/app/models
      - ./modelscope_cache:/root/.cache/modelscope
    depends_on:
      - funasr-gpu0
      - funasr-gpu1
      - funasr-gpu2
      - funasr-gpu3
      - funasr-gpu4
      - funasr-gpu5
      - funasr-gpu6
      - pyannote-gpu0
      - pyannote-gpu1
      - pyannote-gpu2
      - pyannote-gpu3
      - pyannote-gpu4
      - pyannote-gpu5
      - pyannote-gpu6
