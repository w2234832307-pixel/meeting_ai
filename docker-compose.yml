version: '3.8'

services:
  # FunASR服务 - GPU 0
  funasr-gpu0:
    build:
      context: .
      dockerfile: Dockerfile
    image: meeting-ai:latest
    container_name: funasr-gpu0
    ports:
      - "8002:8002"
    volumes:
      - ./models:/app/models
      - ./modelscope_cache:/root/.cache/modelscope
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ['0']
              capabilities: [gpu]
    command: python funasr_standalone/main.py --port 8002

